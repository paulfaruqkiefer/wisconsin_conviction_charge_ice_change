<script>
(function() {
  var COLOR_ORANGE = "#f26f21";
  var COLOR_BLUE = "#005eb8";
  var COLOR_NEUTRAL = "#777777";
  var COLOR_WHITE = "#ffffff";
  var COLOR_GRID = "#d9d9d2";

  function formatNumber(value) {
    return d3.format(".1f")(value);
  }

  function formatChange(value) {
    var sign = value > 0 ? "+" : "";
    return sign + formatNumber(value) + "/mo.";
  }

  function prepareData(rows) {
    return rows
      .map(function(d) {
        var chargeGroup = d.charge_group ? String(d.charge_group).trim() : "";
        var biden = Number(d.Biden);
        var trump = Number(d.Trump);
        var rawChange = Number(d.raw_change);

        return {
          charge_group: chargeGroup,
          Biden: biden,
          Trump: trump,
          change: rawChange,
          abs_change: Math.abs(rawChange),
          direction: rawChange > 0.05 ? "increase" :
            rawChange < -0.05 ? "decrease" : "neutral"
        };
      })
      .filter(function(d) {
        return d.charge_group &&
          !isNaN(d.Biden) &&
          !isNaN(d.Trump) &&
          !isNaN(d.change);
      })
      .sort(function(a, b) {
        return d3.descending(a.abs_change, b.abs_change);
      });
  }

  function render(rows) {
    var chartData = prepareData(rows);
    var container = d3.select("#chart");
    container.selectAll("*").remove();

    var width = container.node().clientWidth;
    var isMobile = width < 640;

    var margin = {
      top: 36,
      right: isMobile ? 46 : 104,
      bottom: 42,
      left: isMobile ? 150 : 260
    };

    var rowHeight = isMobile ? 54 : 48;
    var height = margin.top + margin.bottom + chartData.length * rowHeight;
    var innerWidth = width - margin.left - margin.right;
    var innerHeight = height - margin.top - margin.bottom;

    var maxAbsChange = d3.max(chartData, function(d) {
      return Math.abs(d.change);
    });

    if (!maxAbsChange || maxAbsChange < 1) {
      maxAbsChange = 1;
    }

    var x = d3.scaleLinear()
      .domain([-maxAbsChange * 1.15, maxAbsChange * 1.15])
      .range([0, innerWidth]);

    var y = d3.scaleBand()
      .domain(chartData.map(function(d) { return d.charge_group; }))
      .range([0, innerHeight])
      .padding(0.42);

    var svg = container.append("svg")
      .attr("viewBox", "0 0 " + width + " " + height)
      .attr("role", "img")
      .attr("aria-label", "Lollipop chart showing change in average monthly arrests by charge group.");

    var g = svg.append("g")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

    var ticks = x.ticks(isMobile ? 3 : 5);

    g.selectAll("line.grid-line")
      .data(ticks)
      .enter()
      .append("line")
      .attr("class", "grid-line")
      .attr("x1", function(d) { return x(d); })
      .attr("x2", function(d) { return x(d); })
      .attr("y1", 0)
      .attr("y2", innerHeight);

    g.append("line")
      .attr("class", "zero-line")
      .attr("x1", x(0))
      .attr("x2", x(0))
      .attr("y1", -8)
      .attr("y2", innerHeight + 8);

    g.selectAll("text.axis-label")
      .data(ticks)
      .enter()
      .append("text")
      .attr("class", "axis-label")
      .attr("x", function(d) { return x(d); })
      .attr("y", innerHeight + 28)
      .attr("text-anchor", "middle")
      .text(function(d) { return formatNumber(d); });

    g.append("text")
      .attr("class", "axis-label")
      .attr("x", x(0))
      .attr("y", -16)
      .attr("text-anchor", "middle")
      .text("Change in average monthly arrests");

    g.selectAll("text.category-label")
      .data(chartData)
      .enter()
      .append("text")
      .attr("class", "category-label")
      .attr("x", -14)
      .attr("y", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .text(function(d) {
        if (isMobile && d.charge_group === "Aggravated Assault and Homicide") {
          return "Agg. assault and homicide";
        }
        return d.charge_group;
      });

    var row = g.selectAll("g.row")
      .data(chartData)
      .enter()
      .append("g")
      .attr("class", "row");

    row.append("line")
      .attr("class", "change-line")
      .attr("x1", x(0))
      .attr("x2", function(d) { return x(d.change); })
      .attr("y1", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("y2", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("stroke", function(d) {
        if (d.direction === "increase") return COLOR_ORANGE;
        if (d.direction === "decrease") return COLOR_BLUE;
        return COLOR_NEUTRAL;
      });

    row.append("circle")
      .attr("class", "dot")
      .attr("cx", function(d) { return x(d.change); })
      .attr("cy", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("r", 7)
      .attr("fill", function(d) {
        if (d.direction === "increase") return COLOR_ORANGE;
        if (d.direction === "decrease") return COLOR_BLUE;
        return COLOR_NEUTRAL;
      })
      .attr("stroke", COLOR_WHITE);

    row.append("text")
      .attr("class", "change-label")
      .attr("x", function(d) {
        return x(d.change) + (d.change >= 0 ? 11 : -11);
      })
      .attr("y", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("dy", "0.35em")
      .attr("text-anchor", function(d) {
        return d.change >= 0 ? "start" : "end";
      })
      .attr("fill", function(d) {
        if (d.direction === "increase") return COLOR_ORANGE;
        if (d.direction === "decrease") return COLOR_BLUE;
        return COLOR_NEUTRAL;
      })
      .text(function(d) {
        return formatChange(d.change) + " (Trump: " + formatNumber(d.Trump) + ")";
      });

    row.append("text")
      .attr("class", "small-label")
      .attr("x", x(0) - 12)
      .attr("y", function(d) {
        return y(d.charge_group) + y.bandwidth() / 2;
      })
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .text(function(d) {
        return "Biden: " + formatNumber(d.Biden);
      });
  }

  function loadCsv() {
    d3.csv("admin_monthly_change.csv", function(d) {
      return {
        charge_group: d.charge_group,
        Biden: d.Biden === "" ? NaN : Number(d.Biden),
        Trump: d.Trump === "" ? NaN : Number(d.Trump),
        raw_change: d.raw_change === "" ? NaN : Number(d.raw_change),
        pct_change: d.pct_change === "" ? NaN : Number(d.pct_change),
        pct_change_label: d.pct_change_label
      };
    }).then(function(rows) {
      render(rows);
    }).catch(function(error) {
      console.error("CSV failed to load.", error);
      d3.select("#chart").html(
        "<p style='color:#b00020;font-weight:700;'>CSV failed to load. Check that admin_monthly_change.csv is in the same folder as index.html.</p>"
      );
    });
  }

  loadCsv();

  var resizeTimer;
  window.addEventListener("resize", function() {
    window.clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(loadCsv, 150);
  });
}());
</script>
