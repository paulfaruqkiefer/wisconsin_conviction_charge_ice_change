<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monthly LPR arrests</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Heebo, Arial, sans-serif;
    color: #202020;
    background: #ffffff;
  }

  .graphic-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 16px 32px 16px;
  }

  h1 {
    margin: 0 0 8px 0;
    color: #103b63;
    font-size: 36px;
    line-height: 1.08;
    font-weight: 800;
  }

  .dek {
    max-width: 720px;
    color: #666666;
    font-size: 16px;
    line-height: 1.45;
    margin: 0 0 20px 0;
  }

  .chart-card {
    border-top: 5px solid #f26f21;
    background: #f7f7f4;
    padding: 18px 16px 12px 16px;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }

  .axis-label {
    font-size: 12px;
    font-weight: 700;
    fill: #666666;
  }

  .tick-label {
    font-size: 12px;
    font-weight: 600;
    fill: #666666;
  }

  .grid-line {
    stroke: #d9d9d2;
    stroke-width: 1px;
  }

  .lpr-line {
    fill: none;
    stroke: #f26f21;
    stroke-width: 4px;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dot {
    fill: #005eb8;
    stroke: #ffffff;
    stroke-width: 2px;
  }

  .inauguration-line {
    stroke: #777777;
    stroke-width: 1.5px;
    stroke-dasharray: 4 4;
  }

  .inauguration-label {
    font-size: 12px;
    font-weight: 700;
    fill: #666666;
  }

  .note {
    margin-top: 14px;
    color: #666666;
    font-size: 13px;
    line-height: 1.35;
  }

  @media screen and (max-width: 640px) {
    h1 {
      font-size: 28px;
    }

    .chart-card {
      padding-left: 10px;
      padding-right: 10px;
    }
  }
</style>
</head>

<body>
<main class="graphic-wrap">
  <h1>Monthly arrests of lawful permanent residents</h1>
  <p class="dek">
    Monthly counts show deduplicated arrests of lawful permanent residents in the data.
  </p>

  <section class="chart-card">
    <div id="chart"></div>
    <p class="note">
      Notes: Counts are deduplicated by anonymized identifier within each month. Dashed line marks Jan. 20, 2025.
    </p>
  </section>
</main>

<script>
(function() {
  var COLOR_ORANGE = "#f26f21";
  var COLOR_BLUE = "#005eb8";
  var COLOR_GRID = "#d9d9d2";
  var COLOR_NEUTRAL = "#777777";

  var parseDate = d3.timeParse("%Y-%m-%d");
  var inaugurationDate = new Date(2025, 0, 20);

  var sampleData = [
    { app_month: parseDate("2024-07-01"), lpr_arrests: 4 },
    { app_month: parseDate("2024-08-01"), lpr_arrests: 6 },
    { app_month: parseDate("2024-09-01"), lpr_arrests: 5 },
    { app_month: parseDate("2024-10-01"), lpr_arrests: 7 },
    { app_month: parseDate("2024-11-01"), lpr_arrests: 6 },
    { app_month: parseDate("2024-12-01"), lpr_arrests: 8 },
    { app_month: parseDate("2025-01-01"), lpr_arrests: 9 },
    { app_month: parseDate("2025-02-01"), lpr_arrests: 14 },
    { app_month: parseDate("2025-03-01"), lpr_arrests: 16 }
  ];

  function render(rows) {
    var data = rows
    .filter(function(d) {
      return d.app_month &&
        !isNaN(d.lpr_arrests) &&
        d.lpr_arrests !== null;
    })
    .sort(function(a, b) {
      return d3.ascending(a.app_month, b.app_month);
    });

    var container = d3.select("#chart");
    container.selectAll("*").remove();

    var width = container.node().clientWidth;
    var isMobile = width < 640;

    var margin = {
      top: 34,
      right: isMobile ? 20 : 32,
      bottom: 54,
      left: isMobile ? 46 : 62
    };

    var height = isMobile ? 360 : 430;
    var innerWidth = width - margin.left - margin.right;
    var innerHeight = height - margin.top - margin.bottom;

    var x = d3.scaleTime()
      .domain(d3.extent(data, function(d) { return d.app_month; }))
      .range([0, innerWidth]);

    var yMax = d3.max(data, function(d) { return d.lpr_arrests; }) || 1;

    var y = d3.scaleLinear()
      .domain([0, yMax * 1.15])
      .nice()
      .range([innerHeight, 0]);

    var svg = container.append("svg")
      .attr("viewBox", "0 0 " + width + " " + height)
      .attr("role", "img")
      .attr("aria-label", "Line chart showing monthly arrests of lawful permanent residents.");

    var g = svg.append("g")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

    var yTicks = y.ticks(isMobile ? 4 : 5);

    g.selectAll("line.grid-line")
      .data(yTicks)
      .enter()
      .append("line")
      .attr("class", "grid-line")
      .attr("x1", 0)
      .attr("x2", innerWidth)
      .attr("y1", function(d) { return y(d); })
      .attr("y2", function(d) { return y(d); })
      .attr("stroke", COLOR_GRID);

    g.selectAll("text.y-tick")
      .data(yTicks)
      .enter()
      .append("text")
      .attr("class", "tick-label")
      .attr("x", -10)
      .attr("y", function(d) { return y(d); })
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .text(function(d) { return d3.format(",")(d); });

    var xTicks = x.ticks(d3.timeMonth.every(isMobile ? 3 : 2));

    g.selectAll("text.x-tick")
      .data(xTicks)
      .enter()
      .append("text")
      .attr("class", "tick-label")
      .attr("x", function(d) { return x(d); })
      .attr("y", innerHeight + 26)
      .attr("text-anchor", "middle")
      .text(function(d) { return d3.timeFormat("%b %Y")(d); });

    g.append("text")
      .attr("class", "axis-label")
      .attr("x", -margin.left + 4)
      .attr("y", -14)
      .attr("text-anchor", "start")
      .text("LPR arrests");

    var line = d3.line()
      .x(function(d) { return x(d.app_month); })
      .y(function(d) { return y(d.lpr_arrests); })
      .curve(d3.curveMonotoneX);

    g.append("path")
      .datum(data)
      .attr("class", "lpr-line")
      .attr("d", line)
      .attr("stroke", COLOR_ORANGE);

    g.selectAll("circle.dot")
      .data(data)
      .enter()
      .append("circle")
      .attr("class", "dot")
      .attr("cx", function(d) { return x(d.app_month); })
      .attr("cy", function(d) { return y(d.lpr_arrests); })
      .attr("r", isMobile ? 4 : 5)
      .attr("fill", COLOR_BLUE);

    if (inaugurationDate >= x.domain()[0] && inaugurationDate <= x.domain()[1]) {
      g.append("line")
        .attr("class", "inauguration-line")
        .attr("x1", x(inaugurationDate))
        .attr("x2", x(inaugurationDate))
        .attr("y1", 0)
        .attr("y2", innerHeight)
        .attr("stroke", COLOR_NEUTRAL);

      g.append("text")
        .attr("class", "inauguration-label")
        .attr("x", x(inaugurationDate) + 6)
        .attr("y", 12)
        .attr("text-anchor", "start")
        .text("Jan. 20, 2025");
    }
  }

  function loadCsvOrSample() {
    d3.csv("monthly_lpr_arrests_deduped.csv", function(d) {
      return {
        administration: d.administration,
        app_month: parseDate(d.app_month),
        lpr_arrests: Number(d.lpr_arrests)
      };
    }).then(function(rows) {
      if (rows && rows.length > 0) {
        render(rows);
      } else {
        render(sampleData);
      }
    }).catch(function() {
      render(sampleData);
    });
  }

  loadCsvOrSample();

  var resizeTimer;
  window.addEventListener("resize", function() {
    window.clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(loadCsvOrSample, 150);
  });
}());
</script>
</body>
</html>
